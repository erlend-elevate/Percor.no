[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/shop"
  to = "https://butikk.percor.no"
  status = 301

[[redirects]]
  from = "/shop/*"
  to = "https://butikk.percor.no/:splat"
  status = 301

[[redirects]]
  from = "/nettbutikk"
  to = "https://butikk.percor.no"
  status = 301

[[redirects]]
  from = "/product/*"
  to = "https://butikk.percor.no/products/:splat"
  status = 301

[[redirects]]
  from = "/product-category/*"
  to = "https://butikk.percor.no/collections/:splat"
  status = 301

[[redirects]]
  from = "/payperwear"
  to = "/merkevarer/payper"
  status = 301

[[redirects]]
  from = "/aktuelt"
  to = "/blogg"
  status = 301

[[redirects]]
  from = "/foresporsel"
  to = "/kontakt"
  status = 301

[build.environment]
  NODE_VERSION = "22.12.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
